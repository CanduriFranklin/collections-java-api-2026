# Portabilidad JVM: IgnoreUnrecognizedVMOptions permite que el proyecto corra en HotSpot y OpenJ9 sin fallar
# Optimización de arranque extremo para OpenJ9 en entornos de contenedores/WSL
org.gradle.jvmargs=-XX:+IgnoreUnrecognizedVMOptions \
                   -Xshareclasses:name=collections_cache,cacheDir=/tmp/javashared \
                   -Xquickstart -Xmns64m -Xmx512m
