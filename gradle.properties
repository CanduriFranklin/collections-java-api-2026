# Optimización de arranque extremo para OpenJ9 en entornos de contenedores/WSL
# -Xshareclasses:name=collections_cache,cacheDir=/tmp/javashared permite persistir el JIT y clases cargadas
# -Xquickstart: Habilita compilación JIT temprana para ráfagas cortas de ejecución (ideal para CLI/Tests)
# -Xmns64m -Xmx512m: Ajuste de memoria para eficiencia de recolección en microservicios
org.gradle.jvmargs=-Xshareclasses:name=collections_cache,cacheDir=/tmp/javashared -Xquickstart -Xmns64m -Xmx512m
